name: Build project

on:
  push:
    branches:
      - main
    paths:
      - Source/**
  pull_request:
    branches:
      - main
    paths:
      - Source/**

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1.1.3

      - name: Build Windows Release
        run: msbuild Source/GrasscutterTools.sln /p:Configuration=Release /t:build /restore

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: GrasscutterTools-Windows
          path: Source/GrasscutterTools/bin/Release/GrasscutterTools.exe

  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Android workload
        run: dotnet workload install android

      - name: Restore dependencies
        run: dotnet restore Source/GrasscutterTools.Android.csproj

      - name: Build APK
        run: dotnet build Source/GrasscutterTools.Android.csproj -c Release -f net8.0-android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GrasscutterTools-Android
          path: |
            Source/GrasscutterTools.Android/bin/Release/net8.0-android/*.apk

